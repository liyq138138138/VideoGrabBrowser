name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        uses: malinskiy/action-android/install-sdk@release/0.1.8

      - name: Generate Wrapper JAR
        run: |
          # Create minimal gradle-wrapper.jar (Gradle can generate it)
          cd ${{ github.workspace }}
          wget -q https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar || true
          # If that fails, generate from gradle command
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading full gradle distribution..."
            wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
            unzip -q gradle-8.5-bin.zip
            GRADLE_DIR=$(pwd)/gradle-8.5
            $GRADLE_DIR/bin/gradle wrapper --gradle-version 8.5
            mv gradle/wrapper/gradle-wrapper.jar ${{ github.workspace }}/gradle/wrapper/gradle-wrapper.jar
          fi
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoGrabBrowser-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
